{% extends "base.html" %}
{% block title %}Cache Browser - Email Validator{% endblock %}
{% block content %}
<div class="space-y-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Cache Browser</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Browse, search, and purge cached results</p>
    </div>
    <div class="flex items-center gap-2">
      <a id="export-cache-link" href="/api/cache/export"
        class="btn-ghost border border-gray-200 dark:border-gray-700 text-indigo-600 hover:text-indigo-700 hover:border-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/30">
        ⬇ Export CSV
      </a>
      <button
        hx-post="/api/cache/purge"
        hx-target="#purge-result"
        hx-swap="innerHTML"
        hx-confirm="Delete all expired cache entries?"
        class="btn-ghost border border-gray-200 dark:border-gray-700 text-red-500 hover:text-red-600 hover:border-red-300 hover:bg-red-50 dark:hover:bg-red-950/30">
        🗑 Purge Expired
      </button>
      {% if current_user and current_user.role in ('admin', 'superadmin') %}
      <button
        hx-post="/api/cache/clear"
        hx-confirm="Delete ALL cached results (not just expired)? This cannot be undone."
        hx-on::after-request="if (event.detail.successful) window.location.reload()"
        class="btn-ghost border border-red-200 dark:border-red-900 text-red-600 hover:text-red-700 hover:border-red-400 hover:bg-red-50 dark:hover:bg-red-950/30">
        ⚠ Clear all
      </button>
      {% endif %}
    </div>
  </div>

  <div id="purge-result"></div>

  <!-- Search -->
  <div class="card p-4">
    <input
      type="search"
      name="q"
      placeholder="Search by email address…"
      class="input-base w-full"
      hx-get="/partials/cache-table"
      hx-trigger="input changed delay:300ms, search"
      hx-target="#cache-table"
      hx-swap="innerHTML"
      hx-include="[name='q']"
      oninput="document.getElementById('export-cache-link').href = '/api/cache/export' + (this.value ? '?q=' + encodeURIComponent(this.value) : '')"
    />
  </div>

  <!-- Table -->
  <div class="card overflow-hidden">
    <div id="cache-table"
      hx-get="/partials/cache-table"
      hx-trigger="load"
      hx-swap="innerHTML">
      <div class="p-8 text-center text-gray-400 text-sm">Loading…</div>
    </div>
  </div>

</div>
{% endblock %}
