<!DOCTYPE html>
<html lang="en" id="html-root" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Email Validator{% endblock %}</title>
  <script>
    if (localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .badge-valid   { @apply bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .badge-invalid { @apply bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .badge-risky   { @apply bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .badge-unknown { @apply bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .card { @apply bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl; }
      .input-base { @apply border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 dark:focus:ring-indigo-500; }
      .btn-primary { @apply bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 dark:hover:bg-indigo-500 transition; }
      .btn-ghost { @apply text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-3 py-1.5 rounded-lg text-sm transition hover:bg-gray-100 dark:hover:bg-gray-800; }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 min-h-screen bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col fixed left-0 top-0 bottom-0 z-10 shrink-0">
    <!-- Brand -->
    <div class="px-5 py-5 border-b border-gray-100 dark:border-gray-800">
      <a href="/" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm font-bold shadow-sm">
          ✉
        </div>
        <div class="leading-tight">
          <div class="font-bold text-gray-900 dark:text-white text-sm">Email</div>
          <div class="font-bold text-indigo-600 dark:text-indigo-400 text-sm -mt-0.5">Validator</div>
        </div>
      </a>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5" id="sidebar-nav">
      {% set active = active_page | default('') %}
      <a href="/" data-page="dashboard"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'dashboard' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">📊</span> Dashboard
      </a>
      <a href="/validate" data-page="validate"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'validate' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">✅</span> Validate
      </a>
      <a href="/cache" data-page="cache"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'cache' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">⚡</span> Cache Browser
      </a>
      <a href="/analytics" data-page="analytics"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'analytics' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">📈</span> Analytics
      </a>
      <a href="/jobs" data-page="jobs"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'jobs' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">📋</span> History
      </a>
      <a href="/settings" data-page="settings"
        class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
          {% if active == 'settings' %}bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white{% endif %}">
        <span class="text-base leading-none">⚙</span> Settings
      </a>
    </nav>

    <!-- Provider status -->
    <div class="px-4 py-3 border-t border-gray-100 dark:border-gray-800">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Providers</p>
      <div id="sidebar-providers">
        <!-- populated by JS below -->
      </div>
    </div>

    <!-- Footer -->
    <div class="px-4 py-3 border-t border-gray-100 dark:border-gray-800 flex items-center justify-between">
      <a href="/docs" target="_blank" class="text-xs text-gray-400 hover:text-indigo-500 transition">API Docs</a>
      <button onclick="toggleDark()" id="dark-toggle"
        class="text-lg leading-none text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition" title="Toggle dark mode">
        🌙
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="ml-56 flex-1 min-h-screen">
    <main class="max-w-5xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function toggleDark() {
      const html = document.getElementById('html-root');
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('dark-toggle').textContent = isDark ? '☀' : '🌙';
    }

    // Set correct icon on load
    if (document.documentElement.classList.contains('dark')) {
      document.getElementById('dark-toggle').textContent = '☀';
    }

    // Populate provider status from health API
    fetch('/api/health').then(r => r.json()).then(data => {
      const el = document.getElementById('sidebar-providers');
      const all = ['local','bouncify','zerobounce','neverbounce','hunter'];
      const enabled = new Set(data.providers_enabled || []);
      el.innerHTML = all.map(p => {
        const on = enabled.has(p);
        return `<div class="flex items-center gap-2 py-0.5">
          <span class="w-2 h-2 rounded-full ${on ? 'bg-green-400' : 'bg-gray-300 dark:bg-gray-600'}"></span>
          <span class="text-xs ${on ? 'text-gray-600 dark:text-gray-300' : 'text-gray-400 dark:text-gray-600'}">${p}</span>
        </div>`;
      }).join('');
    }).catch(() => {});
  </script>
</body>
</html>
