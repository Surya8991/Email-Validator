<div id="progress-block"
  {% if job.status in ['queued','running'] %}
  hx-get="/jobs/{{ job.id }}/status" hx-trigger="every 2s" hx-swap="outerHTML"
  {% endif %}
  class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
  <div class="flex justify-between text-sm text-gray-600">
    <span>{{ job.processed }} / {{ job.total }} emails processed</span>
    <span>{{ pct }}%</span>
  </div>
  <div class="w-full bg-gray-100 rounded-full h-2">
    <div class="bg-indigo-500 h-2 rounded-full transition-all" style="width: {{ pct }}%"></div>
  </div>
  {% if job.status == 'done' %}
  <p class="text-xs text-green-600 font-medium">✓ Complete — <a href="/api/bulk/{{ job.id }}/download" class="underline">Download CSV</a></p>
  {% elif job.status == 'failed' %}
  <p class="text-xs text-red-600">✗ Failed: {{ job.error or 'unknown error' }}</p>
  {% endif %}
</div>
