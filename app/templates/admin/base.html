<!DOCTYPE html>
<html lang="en" id="html-root" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin{% endblock %} — Email Validator</title>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <style type="text/tailwindcss">
    @layer utilities {
      .badge-valid   { @apply bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .badge-invalid { @apply bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300 text-xs px-2 py-0.5 rounded-full font-semibold; }
      .card { @apply bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl; }
      .input-base { @apply border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400; }
      .btn-primary { @apply bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition; }
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Top bar -->
  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 h-14 flex items-center px-5 gap-3 shrink-0 z-10">
    <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs font-bold">✉</div>
    <span class="font-bold text-sm text-gray-900 dark:text-white">Email<span class="text-indigo-600 dark:text-indigo-400">Validator</span></span>
    <span class="bg-amber-100 dark:bg-amber-900/50 text-amber-800 dark:text-amber-300 text-xs font-bold px-2 py-0.5 rounded-full">ADMIN</span>
    <div class="ml-auto flex items-center gap-3">
      <a href="/" class="text-xs text-gray-400 hover:text-indigo-500 transition font-medium">← Back to App</a>
      <span class="text-gray-300 dark:text-gray-700">|</span>
      <span class="text-xs text-gray-500 dark:text-gray-400">{{ current_user.email }}</span>
    </div>
  </header>

  <div class="flex flex-1">

    <!-- Sidebar -->
    <aside class="w-52 shrink-0 bg-indigo-950 dark:bg-gray-900 flex flex-col">
      <nav class="flex-1 px-3 py-5 space-y-0.5">
        {% set ap = admin_active | default('') %}
        <a href="/admin/users"
          class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
            {% if ap == 'users' %}bg-indigo-700 text-white{% else %}text-indigo-200 hover:bg-indigo-800/60 hover:text-white{% endif %}">
          👥 Users
        </a>
        <a href="/admin"
          class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
            {% if ap == 'stats' %}bg-indigo-700 text-white{% else %}text-indigo-200 hover:bg-indigo-800/60 hover:text-white{% endif %}">
          📊 System Stats
        </a>
        <a href="/admin/usage"
          class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
            {% if ap == 'usage' %}bg-indigo-700 text-white{% else %}text-indigo-200 hover:bg-indigo-800/60 hover:text-white{% endif %}">
          📋 Usage
        </a>
        <a href="/admin/providers"
          class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
            {% if ap == 'providers' %}bg-indigo-700 text-white{% else %}text-indigo-200 hover:bg-indigo-800/60 hover:text-white{% endif %}">
          ⚙ Providers
        </a>
      </nav>
      <div class="px-4 py-4 border-t border-indigo-900">
        <form method="post" action="/logout">
          <button type="submit" class="w-full text-left text-xs text-indigo-400 hover:text-red-400 transition font-medium px-3 py-1.5">
            → Sign out
          </button>
        </form>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto p-8">
      {% block content %}{% endblock %}
    </main>

  </div>

</body>
</html>
