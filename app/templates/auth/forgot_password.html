<!DOCTYPE html>
<html lang="en" id="html-root" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Email Validator</title>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg">✉</div>
      <span class="font-bold text-xl text-gray-900 dark:text-white">Email<span class="text-indigo-600 dark:text-indigo-400">Validator</span></span>
    </div>

    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm p-8">

      {% if sent %}
      <div class="text-center">
        <div class="text-5xl mb-4">📬</div>
        <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Check your email</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
          If an account exists for that address, we've sent a password reset link.<br>
          The link expires in 30 minutes.
        </p>
        <a href="/login" class="inline-block bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
          Back to sign in
        </a>
      </div>

      {% else %}
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Forgot password?</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
          Enter your email and we'll send you a reset link.
        </p>
      </div>

      <form method="post" action="/forgot-password" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email address</label>
          <input type="email" name="email" required autofocus
            class="w-full border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition mt-2">
          Send reset link →
        </button>
      </form>

      <p class="text-xs text-center text-gray-400 mt-5">
        Remembered it? <a href="/login" class="text-indigo-500 hover:underline">Sign in</a>
      </p>
      {% endif %}

    </div>
  </div>
</body>
</html>
