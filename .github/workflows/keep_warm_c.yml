name: Keep Warm C

# Third redundancy partner. See keep_warm.yml for full rationale.
# Cron offset is +4 from the 5-min grid so the three workflows together
# cover offsets {1, 2, 4} within each 5-min window — close enough that
# if the scheduler is awake at all, at least one usually fires.

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL repo variable is not set."
            exit 1
          fi
          echo "Pinging $APP_URL/api/health"
          for i in 1 2 3; do
            response=$(curl -sS -o /tmp/body.json -w "%{http_code}" --max-time 15 "$APP_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $response"
            if [ "$response" = "200" ]; then
              cat /tmp/body.json
              echo
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check failed after 3 attempts (last status: $response)"
          cat /tmp/body.json || true
          exit 1
