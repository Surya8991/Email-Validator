name: Bulk Email Validation
run-name: "Bulk #${{ inputs.job_id }} — ${{ inputs.triggered_by || 'unknown user' }}"

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID to process"
        required: true
        type: string
      cache_ttl_days:
        description: "Cache TTL in days (0 = no cache, blank = repo default)"
        required: false
        type: string
        default: ""
      triggered_by:
        description: "Email of the user who submitted the job (for run-name only)"
        required: false
        type: string
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Cap concurrent bulk runs at 3 by bucketing job_id's last digit into
    # 3 groups — GHA expression syntax has no `%` operator, so partition
    # the 10 trailing digits across {a,b,c} with endsWith(). A 4th
    # dispatched job lands in whichever bucket and waits for the run
    # ahead of it. Accuracy degrades past ~3 parallel workers (Bouncify
    # rate limits start producing 'unknown').
    concurrency:
      group: >-
        bulk-${{
          (endsWith(inputs.job_id, '0') || endsWith(inputs.job_id, '3') ||
           endsWith(inputs.job_id, '6') || endsWith(inputs.job_id, '9')) && 'a'
          || (endsWith(inputs.job_id, '1') || endsWith(inputs.job_id, '4') ||
              endsWith(inputs.job_id, '7')) && 'b'
          || 'c'
        }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process job
        id: process
        # Pass inputs.job_id via env, never as a shell-interpolated literal.
        run: python scripts/process_job.py --job-id "$JOB_ID"
        env:
          JOB_ID: ${{ inputs.job_id }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOUNCIFY_API_KEY: ${{ secrets.BOUNCIFY_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          # Prefer the per-job value sent by the API; fall back to repo var.
          CACHE_TTL_DAYS: ${{ inputs.cache_ttl_days != '' && inputs.cache_ttl_days || vars.CACHE_TTL_DAYS }}
          # Concurrency knobs — leave repo vars unset to use the script
          # defaults (CHUNK_SIZE=20, BULK_SUB_BATCH=500). With 3-parallel
          # workers running, CHUNK_SIZE=10 is a safer ceiling on Bouncify
          # free / starter tiers.
          CHUNK_SIZE: ${{ vars.CHUNK_SIZE }}
          BULK_SUB_BATCH: ${{ vars.BULK_SUB_BATCH }}
          # Emails between progress lines (default 50). Raise to 200+ to
          # quiet the log on large jobs; lower to 10 to follow closely.
          PROGRESS_EVERY: ${{ vars.PROGRESS_EVERY }}
          # Set repo var BOUNCIFY_BULK=1 to enable the bulk-API path for
          # bouncify_only / local_first jobs (10× faster, handles its own
          # rate limiting). Default off — flip on after running one ~1k
          # job with the var set and confirming verdicts match per-email.
          BOUNCIFY_BULK: ${{ vars.BOUNCIFY_BULK }}

      # Always notify the app so it can mark the job 'failed' when this run
      # was cancelled in the GitHub UI, killed by the runner, or timed out —
      # cases where the script's own _mark_failed never ran. APP_URL is a
      # repo variable (e.g. https://your-app.vercel.app); JOB_CALLBACK_TOKEN
      # is a repo secret that MUST match Vercel's env var of the same name.
      - name: Notify app of run conclusion
        if: always() && vars.APP_URL != ''
        env:
          JOB_ID: ${{ inputs.job_id }}
          CONCLUSION: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APP_URL: ${{ vars.APP_URL }}
          CALLBACK_TOKEN: ${{ secrets.JOB_CALLBACK_TOKEN }}
        run: |
          curl -fsS -X POST "$APP_URL/api/bulk/$JOB_ID/workflow-callback" \
            -H "X-Callback-Token: $CALLBACK_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$(jq -nc \
                --arg c "$CONCLUSION" \
                --arg u "$RUN_URL" \
                '{conclusion:$c, run_url:$u}')" \
            || echo "[WARN] callback to $APP_URL failed (non-fatal)"
