name: CodeQL

# GitHub's static-analysis security scanner. Catches SQL injection,
# path traversal, hardcoded secrets, unsafe deserialization, and other
# code-level issues that pip-audit (deps-only) can't see.
#
# Findings show up in Security → Code scanning alerts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"  # Mondays 04:30 UTC — catches drift on dormant code

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
