name: Mark Job Unknowns Invalid

# Force-flips every 'unknown' EmailResult row for a given job to 'invalid'.
# Use to skip the remaining retry strikes when you're certain the unknowns
# won't resolve (dead domains, parked MX, etc.) and want the job fully closed.
#
# Trigger: gh workflow run mark_unknowns_invalid.yml -f job_id=79

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID whose unknowns get flipped (blank = all jobs)"
        required: false
        type: string
        default: ""
      min_retry_count:
        description: "Only flip rows with retry_count >= this value (default 0)"
        required: false
        type: string
        default: "0"
      dry_run:
        description: "Just print the count without updating"
        required: false
        type: boolean
        default: false

jobs:
  flip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Flip unknowns
        env:
          JOB_ID: ${{ inputs.job_id }}
          MIN_RC: ${{ inputs.min_retry_count || '0' }}
          DRY_RUN: ${{ inputs.dry_run }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=(--min-retry-count "$MIN_RC")
          if [ -n "$JOB_ID" ]; then
            ARGS+=(--job-id "$JOB_ID")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/mark_job_unknowns_invalid.py "${ARGS[@]}"
