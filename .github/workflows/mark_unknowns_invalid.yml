name: Mark Job Unknowns Invalid

# Force-flips every 'unknown' EmailResult row for a given job to 'invalid'.
# Use to skip the remaining retry strikes when you're certain the unknowns
# won't resolve (dead domains, parked MX, etc.) and want the job fully closed.
#
# Trigger: gh workflow run mark_unknowns_invalid.yml -f job_id=79

on:
  # Hourly auto-drain for the legacy strike-3 stragglers (rows stuck at
  # retry_count=2 / verdict='unknown' after PR #21 dropped strikes 3→2).
  # The date guard below makes the schedule a no-op from 2026-07-01 on,
  # so this is self-disabling — just leave the cron block in place. To
  # extend, bump the AUTO_DRAIN_UNTIL value below.
  schedule:
    - cron: "20 * * * *"   # every hour at :20
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID whose unknowns get flipped (blank = all jobs)"
        required: false
        type: string
        default: ""
      min_retry_count:
        description: "Only flip rows with retry_count >= this value (default 0)"
        required: false
        type: string
        default: "0"
      dry_run:
        description: "Just print the count without updating"
        required: false
        type: boolean
        default: false

# Last day the hourly schedule actually runs anything. After this date
# the cron-triggered runs see expired=true and exit clean without
# touching the DB. Manual workflow_dispatch ignores the guard and
# always runs.
env:
  AUTO_DRAIN_UNTIL: "2026-06-30"

jobs:
  flip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check auto-drain expiry
        id: drain
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NOW=$(date -u +%Y-%m-%d)
            if [ "$NOW" \> "$AUTO_DRAIN_UNTIL" ]; then
              echo "Auto-drain ended on $AUTO_DRAIN_UNTIL (today is $NOW). Skipping."
              echo "expired=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/checkout@v7
        if: steps.drain.outputs.expired != 'true'

      - uses: actions/setup-python@v6
        if: steps.drain.outputs.expired != 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.drain.outputs.expired != 'true'
        run: pip install -r requirements.txt

      - name: Flip unknowns
        if: steps.drain.outputs.expired != 'true'
        env:
          JOB_ID: ${{ inputs.job_id }}
          # Scheduled runs always target retry_count >= 2 (the strike-2
          # stragglers from the pre-PR-#21 retry workflows). Manual
          # dispatches honor whatever min_retry_count the user passes.
          MIN_RC: ${{ github.event_name == 'schedule' && '2' || (inputs.min_retry_count || '0') }}
          DRY_RUN: ${{ inputs.dry_run }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=(--min-retry-count "$MIN_RC")
          if [ -n "$JOB_ID" ]; then
            ARGS+=(--job-id "$JOB_ID")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/mark_job_unknowns_invalid.py "${ARGS[@]}"
