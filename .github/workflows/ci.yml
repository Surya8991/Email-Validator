name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app
        continue-on-error: true  # type drift is reported but doesn't block merges yet

      - name: Pytest
        env:
          # tests run against in-memory sqlite — no Postgres needed
          DATABASE_URL: ""
        run: pytest -q
