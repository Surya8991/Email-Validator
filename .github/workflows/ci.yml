name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress CI runs when a new push lands on the same ref. Avoids
# burning two parallel runs (and double GHA minutes) on a quick fixup push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio respx

      - name: pip-audit
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app
        continue-on-error: true  # type drift is reported but doesn't block merges yet

      - name: Pytest
        env:
          # tests run against in-memory sqlite — no Postgres needed
          DATABASE_URL: ""
        run: pytest -q
