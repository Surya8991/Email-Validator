name: Keep Warm

# Pings the deployed app on a schedule so Neon (free tier auto-pauses
# after ~5 min) and the Vercel function (cold-starts after ~5 min idle)
# stay warm. The /api/health endpoint runs a SELECT 1 against the DB,
# so this wakes both layers in one shot.
#
# Cost: free. ~10s per run, ~30–40 min/month — well within GitHub Actions'
# free quota for private repos (2000 min/month).
#
# Setup: add a repo variable APP_URL with your deployed origin, e.g.
#   APP_URL = https://email-validator-lilac.vercel.app
# Settings -> Secrets and variables -> Actions -> Variables tab -> New.
#
# Why every 5 min (and NOT every 3 min):
#  GitHub Actions' documented minimum for `schedule:` is 5 minutes. Denser
#  schedules (e.g. */3) are silently coalesced and tend to be deprioritized
#  on free-tier runners — we saw this firsthand: ZERO scheduled runs for an
#  hour while every manual dispatch ran fine. 5-min cadence is also enough
#  for Neon's ~5-min idle timeout. Offset by 2 from the hour grid to dodge
#  peak scheduler congestion at xx:00, xx:05, xx:10 …
#
# Activation delay: GitHub re-registers the schedule on every push to the
# default branch and routinely takes 30-90 min to start firing the first
# time on a new schedule. If runs don't appear within 90 min, fall back to
# an external pinger (UptimeRobot free tier — 5-min pings, no setup) or
# just rely on real traffic.

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:  # manual run button

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL repo variable is not set. Add it in Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi
          echo "Pinging $APP_URL/api/health"
          # Retry up to 3 times for cold starts; fail loudly if the site is actually down.
          for i in 1 2 3; do
            response=$(curl -sS -o /tmp/body.json -w "%{http_code}" --max-time 15 "$APP_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $response"
            if [ "$response" = "200" ]; then
              cat /tmp/body.json
              echo
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check failed after 3 attempts (last status: $response)"
          cat /tmp/body.json || true
          exit 1
