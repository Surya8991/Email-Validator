name: Retry Unknown Verdicts
run-name: "Retry unknowns — bucket ${{ inputs.bucket || 0 }}/${{ inputs.bucket_of || 1 }} (batch ${{ inputs.batch_size }})${{ inputs.job_id && format(' job#{0}', inputs.job_id) || '' }}"

on:
  schedule:
    # Twice daily — 08:00 IST (02:30 UTC) and 23:00 IST (17:30 UTC).
    # GitHub Actions cron is UTC; IST = UTC+5:30, hence the :30 offsets.
    # 3-strikes rule (UNKNOWN_STRIKES=3) means each unknown is resolved or
    # flipped to invalid within ~2 days at this cadence.
    - cron: "30 2,17 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Unknowns processed per DB round-trip (default: 500)"
        required: false
        type: string
        default: "500"
      max_batches:
        description: "Stop after N batches (0 = run until no unknowns left)"
        required: false
        type: string
        default: "0"
      job_id:
        description: "Restrict to this job's unknowns (blank = all jobs)"
        required: false
        type: string
        default: ""
      since_days:
        description: "Only retry unknowns from the last N days (0 = all time)"
        required: false
        type: string
        default: "0"
      providers:
        description: "Comma-separated provider list (default: bouncify)"
        required: false
        type: string
        default: "bouncify"
      strategy:
        description: "Validation strategy (default: bouncify_only)"
        required: false
        type: string
        default: "bouncify_only"
      strikes:
        description: "Flip verdict to 'invalid' after this many failed retries (default: 3)"
        required: false
        type: string
        default: "3"
      bucket:
        description: "Hash-bucket index this run processes, 0-based (default: 0)"
        required: false
        type: string
        default: "0"
      bucket_of:
        description: "Total number of hash buckets (default: 1 = no bucketing)"
        required: false
        type: string
        default: "1"

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Same 3-bucket concurrency scheme as bulk_process — GHA expression
    # syntax has no `%` operator, so partition `bucket` across {a,b,c}
    # with endsWith() on its last digit. Fan-out admin dispatches send
    # bucket=0,1,2,...,14 — each distinct bucket lands in one of the
    # 3 GHA queues, so at most 3 retry runs execute at once and the
    # remaining 12 wait in the queue.
    concurrency:
      group: >-
        bulk-retry-${{
          (endsWith(inputs.bucket, '0') || endsWith(inputs.bucket, '3') ||
           endsWith(inputs.bucket, '6') || endsWith(inputs.bucket, '9')) && 'a'
          || (endsWith(inputs.bucket, '1') || endsWith(inputs.bucket, '4') ||
              endsWith(inputs.bucket, '7')) && 'b'
          || 'c'
        }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retry unknowns
        run: |
          ARGS=(--batch-size "$BATCH_SIZE" --max-batches "$MAX_BATCHES" \
                --since-days "$SINCE_DAYS" --providers "$PROVIDERS" \
                --strategy "$STRATEGY" --strikes "$STRIKES")
          if [ -n "$JOB_ID" ]; then
            ARGS+=(--job-id "$JOB_ID")
          fi
          # Only pass bucket flags when fan-out is actually in use
          # (bucket_of > 1). Single-shot manual dispatches default to
          # bucket=0 of=1 which leaves the SELECT unbucketed.
          if [ "$BUCKET_OF" -gt 1 ] 2>/dev/null; then
            ARGS+=(--bucket "$BUCKET" --bucket-of "$BUCKET_OF")
          fi
          python scripts/retry_unknowns.py "${ARGS[@]}"
        env:
          BATCH_SIZE: ${{ inputs.batch_size || '500' }}
          MAX_BATCHES: ${{ inputs.max_batches || '0' }}
          JOB_ID: ${{ inputs.job_id || '' }}
          SINCE_DAYS: ${{ inputs.since_days || '0' }}
          STRIKES: ${{ inputs.strikes || '3' }}
          BUCKET: ${{ inputs.bucket || '0' }}
          BUCKET_OF: ${{ inputs.bucket_of || '1' }}
          PROVIDERS: ${{ inputs.providers || 'bouncify' }}
          STRATEGY: ${{ inputs.strategy || 'bouncify_only' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOUNCIFY_API_KEY: ${{ secrets.BOUNCIFY_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          CACHE_TTL_DAYS: ${{ vars.CACHE_TTL_DAYS }}
          CHUNK_SIZE: ${{ vars.CHUNK_SIZE }}
          PROGRESS_EVERY: ${{ vars.PROGRESS_EVERY }}
