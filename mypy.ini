[mypy]
python_version = 3.12
strict = True
ignore_missing_imports = True

# SQLModel doesn't ship mypy stubs — all table=True / subclass "SQLModel"
# errors in models.py are framework false positives, not real bugs.
[mypy-app.models]
disable_error_code = misc, call-arg

# FastAPI @router.get / .post / .put / .delete / .patch decorators don't
# expose typed return wrappers in mypy's view, so every route function fires
# [untyped-decorator] and [no-untyped-def]. SQLAlchemy column operators
# (.in_ / .desc / .asc / .contains) are also invisible to mypy via SQLModel,
# producing [attr-defined] and [union-attr] false positives on every ORM
# query. [no-any-return] fires on SQLModel .first() / .get() / bcrypt returns,
# all of which are third-party stubs gaps. [unused-ignore] is a housekeeping
# check suppressed here so stale comments don't block PRs during migration.
[mypy-app.routes.*]
disable_error_code = no-untyped-def, untyped-decorator, no-untyped-call, attr-defined, union-attr, no-any-return, unused-ignore, arg-type, call-overload

# FastAPI middleware + lifespan hooks have the same decorator stubs gap.
[mypy-app.main]
disable_error_code = misc, no-untyped-def, untyped-decorator, no-untyped-call, union-attr

# Tenacity @retry decorator + httpx response .json() (returns Any) fire
# [untyped-decorator] and [no-any-return] on every provider — stubs gap.
[mypy-app.providers.*]
disable_error_code = untyped-decorator, no-any-return
